services:
  mysql:
    image: mysql:8.0
    container_name: nba_lab_mysql
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-nba_lab}
      MYSQL_USER: ${MYSQL_USER:-nba}
      TZ: ${TZ:-Asia/Shanghai}
      LANG: C.UTF-8
    ports:
      - "${MYSQL_HOST_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --skip-character-set-client-handshake
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build: ./backend
    container_name: nba_lab_backend
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql+pymysql://${MYSQL_USER:-nba}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE:-nba_lab}?charset=utf8mb4
      FACE_DIR: /app/faces
      FACE_MODEL_DIR: /app/models
      TZ: ${TZ:-Asia/Shanghai}
      PYTHONIOENCODING: utf-8
      LANG: C.UTF-8
    ports:
      - "8000:8000"
    volumes:
      - ./backend/faces:/app/faces
      - ./backend/models:/app/models:ro

  frontend:
    build: ./frontend
    container_name: nba_lab_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  mysql_data:
